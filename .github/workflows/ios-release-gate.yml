name: iOS Release Gate

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Capability Audit
        run: bash scripts/audit_ios_capabilities.sh

      - name: Build, Unit, and UI Smoke Release Gate
        run: RUN_UI_SMOKE=1 bash scripts/ci_release_gate.sh
